<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Snake Game</title>
</head>
<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>High Score: <span id="hscore">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Score: <span id="score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Time: <span id="time">00-00</span>
                    </h3>
                </div>
            </div>

            <div class="board">
            </div>
        </section>

        <div class="modal">
            <div class="start-gm">
                <h3>Welcome to Snake Game</h3>
                <button class="btn btn-start">Start</button>
            </div>
            <div class="over-gm">
                <h3>Oops Game over!!</h3>
                <p>Your score was: <span id="over-score">0</span></p>
                <button class="btn btn-over">Restart</button>
            </div>
            <div class="win-gm">
                <h3>Congo You Have Won the Game!!</h3>
                <button class="btn btn-over">Restart</button>
            </div>
        </div>
    </main>

        <script src="app.js"></script>
    </div>
</body>
</html>
